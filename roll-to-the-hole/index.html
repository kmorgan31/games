<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Rider — Roll to the Hole</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<a href="../index.html" class="back-link">← All games</a>
<h1>Roll to the Hole</h1>

<div id="hud">
  <div class="hud-box">
    <span class="hud-label">Time Left</span>
    <span class="hud-value" id="timer-val">30</span>
  </div>
  <div class="hud-box">
    <span class="hud-label">Level</span>
    <span class="hud-value" id="level-val">1</span>
  </div>
  <div class="hud-box">
    <span class="hud-label">Lines</span>
    <span class="hud-value" id="lines-val">0</span>
    <span class="hud-sub" id="lines-limit-sub">/ 4</span>
  </div>
</div>

<div id="controls">
  <div class="ctrl-group">
    <button id="btn-draw" class="active" onclick="setMode('draw')">✏ Draw</button>
    <button id="btn-erase" onclick="setMode('erase')">✕ Erase</button>
    <button id="btn-undo" onclick="undoLine()">⎌ Undo</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <button id="btn-clear" onclick="clearLines()">⊘ Clear Lines</button>
    <button id="btn-reset-ball" onclick="resetBall()">↺ Reset Ball</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ctrl-group">
    <button id="btn-launch" onclick="launch()">▶ Launch</button>
  </div>
</div>

<div id="canvas-area">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">You Win!</h2>
      <div id="overlay-stars"></div>
      <p id="overlay-sub">Nice work. Setting up next level...</p>
      <p id="overlay-bonus"></p>
      <button onclick="nextLevel()">Next Level →</button>
    </div>
  </div>
  <div id="level-nav">
    <button id="btn-prev" onclick="prevLevel()">◀ Prev</button>
    <button id="btn-next" onclick="skipLevel()">Next ▶</button>
  </div>
</div>

<p id="hint">Draw lines to guide the ball into the ★ hole. &nbsp;<span style="color:var(--muted)">D = draw &nbsp; E = erase</span></p>
<p id="legend">
  <span style="color:#a0c8ff">■ Static</span>
  <span style="color:#ff9040">■ Moving</span>
  <span style="color:#50e896">■ Bouncy</span>
  <span style="color:#e050dc">■ Moving hole</span>
  <span style="color:#f0c040">★ Checkpoint (must touch)</span>
</p>

<script>
// ──────────────────────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────────────────────
const W = Math.min(window.innerWidth - 32, 700);
const H = Math.round(W * 0.72);
const GRAVITY = 0.22;
const FRICTION = 0.998;
const BALL_R = 10;
const HOLE_R = 16;
const TIME_LIMIT = 30;
const ERASE_RADIUS = 18;

// ──────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────
let canvas, ctx;
let mode = 'draw';
let drawing = false;
let currentLine = null;
let userLines = [];
let ball = null;
let hole = null;
let obstacles = [];
let launched = false;
let gameOver = false;
let won = false;
let timer = TIME_LIMIT;
let timerInterval = null;
let level = 1;
let animId = null;
let linesLimit = 4;

// ──────────────────────────────────────────────────────────────
// LEVELS
// lineLimit: max lines the player can draw (strategic constraint)
// required: true — ball must touch this platform before the hole counts
// platform types:
//   static:  { x1,y1,x2,y2 }
//   moving:  { x1,y1,x2,y2, moveAxis:'x'|'y', moveRange, moveSpeed }
//   bouncy:  { x1,y1,x2,y2, bouncy:true }
// hole: { x,y } or { x,y, moveAxis:'x'|'y', moveRange, moveSpeed }
// ──────────────────────────────────────────────────────────────
const LEVELS = [
  // Level 1 — gentle intro (no checkpoints, learn the basics)
  {
    lineLimit: 4,
    ballSide: 'left',
    platforms: [
      { x1: 0.15, y1: 0.25, x2: 0.40, y2: 0.25 },
      { x1: 0.55, y1: 0.50, x2: 0.85, y2: 0.50 },
      { x1: 0.10, y1: 0.72, x2: 0.50, y2: 0.72 },
    ],
    hole: { x: 0.75, y: 0.88 }
  },
  // Level 2 — staircase: must use the stairs, not skip to the bottom
  {
    lineLimit: 5,
    ballSide: 'right',
    platforms: [
      { x1: 0.60, y1: 0.22, x2: 0.92, y2: 0.22 },
      { x1: 0.35, y1: 0.40, x2: 0.58, y2: 0.40, required: true },
      { x1: 0.08, y1: 0.58, x2: 0.32, y2: 0.58, required: true },
      { x1: 0.05, y1: 0.75, x2: 0.65, y2: 0.75 },
    ],
    hole: { x: 0.82, y: 0.91 }
  },
  // Level 3 — moving platforms: must pass through the bottom shelf
  {
    lineLimit: 5,
    ballSide: 'left',
    platforms: [
      { x1: 0.05, y1: 0.25, x2: 0.30, y2: 0.25 },
      { x1: 0.35, y1: 0.25, x2: 0.60, y2: 0.25, moveAxis: 'x', moveRange: 0.25, moveSpeed: 0.012 },
      { x1: 0.10, y1: 0.52, x2: 0.40, y2: 0.52 },
      { x1: 0.55, y1: 0.52, x2: 0.92, y2: 0.52, moveAxis: 'x', moveRange: 0.18, moveSpeed: 0.018 },
      { x1: 0.05, y1: 0.74, x2: 0.55, y2: 0.74, required: true },
    ],
    hole: { x: 0.78, y: 0.90 }
  },
  // Level 4 — bouncy: must hit both bounce pads
  {
    lineLimit: 4,
    ballSide: 'right',
    platforms: [
      { x1: 0.60, y1: 0.20, x2: 0.95, y2: 0.20 },
      { x1: 0.30, y1: 0.38, x2: 0.55, y2: 0.38, bouncy: true, required: true },
      { x1: 0.05, y1: 0.55, x2: 0.40, y2: 0.55 },
      { x1: 0.48, y1: 0.68, x2: 0.75, y2: 0.68, bouncy: true, required: true },
      { x1: 0.05, y1: 0.82, x2: 0.38, y2: 0.82 },
      { x1: 0.62, y1: 0.82, x2: 0.95, y2: 0.82 },
    ],
    hole: { x: 0.50, y: 0.93 }
  },
  // Level 5 — moving hole: must cross the right shelf and bottom floor
  {
    lineLimit: 6,
    ballSide: 'left',
    platforms: [
      { x1: 0.05, y1: 0.22, x2: 0.38, y2: 0.30 },
      { x1: 0.55, y1: 0.28, x2: 0.92, y2: 0.22 },
      { x1: 0.10, y1: 0.52, x2: 0.45, y2: 0.52, moveAxis: 'y', moveRange: 0.10, moveSpeed: 0.022 },
      { x1: 0.55, y1: 0.62, x2: 0.90, y2: 0.62, required: true },
      { x1: 0.05, y1: 0.82, x2: 0.42, y2: 0.82, required: true },
      { x1: 0.58, y1: 0.82, x2: 0.92, y2: 0.82 },
    ],
    hole: { x: 0.50, y: 0.92, moveAxis: 'x', moveRange: 0.30, moveSpeed: 0.020 }
  },
  // Level 6 — everything: must hit the moving shelf and the far static ledge
  {
    lineLimit: 7,
    ballSide: 'right',
    platforms: [
      { x1: 0.55, y1: 0.18, x2: 0.92, y2: 0.18 },
      { x1: 0.10, y1: 0.32, x2: 0.40, y2: 0.32, moveAxis: 'x', moveRange: 0.20, moveSpeed: 0.025, required: true },
      { x1: 0.48, y1: 0.46, x2: 0.75, y2: 0.46, bouncy: true },
      { x1: 0.05, y1: 0.60, x2: 0.35, y2: 0.60, required: true },
      { x1: 0.45, y1: 0.72, x2: 0.75, y2: 0.72, moveAxis: 'y', moveRange: 0.12, moveSpeed: 0.030 },
      { x1: 0.05, y1: 0.86, x2: 0.40, y2: 0.86 },
      { x1: 0.60, y1: 0.86, x2: 0.95, y2: 0.86 },
    ],
    hole: { x: 0.50, y: 0.94, moveAxis: 'x', moveRange: 0.35, moveSpeed: 0.028 }
  }
];

// ──────────────────────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas = document.getElementById('c');
  ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;
  document.getElementById('canvas-wrap').style.width = W + 'px';

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', onUp);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(touch(e)); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); onMove(touch(e)); }, { passive: false });
  canvas.addEventListener('touchend',   e => { e.preventDefault(); onUp();           }, { passive: false });

  document.addEventListener('keydown', e => {
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.key === 'd' || e.key === 'D') setMode('draw');
    if (e.key === 'e' || e.key === 'E') setMode('erase');
  });

  loadLevel(level);
  render();
});

function touch(e) {
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  return { clientX: t.clientX - r.left, clientY: t.clientY - r.top };
}

function canvasXY(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left), y: (e.clientY - r.top) };
}

// ──────────────────────────────────────────────────────────────
// LEVEL SETUP
// ──────────────────────────────────────────────────────────────
function loadLevel(n) {
  const idx = (n - 1) % LEVELS.length;
  const def = LEVELS[idx];

  userLines = [];
  launched = false;
  gameOver = false;
  won = false;
  timer = TIME_LIMIT;
  linesLimit = def.lineLimit || 8;
  clearInterval(timerInterval);
  if (animId) cancelAnimationFrame(animId);

  setupBallAndObstacles(def);
  updateHUD();
  hideOverlay();
  render();
}

function setupBallAndObstacles(def) {
  const bx = def.ballSide === 'left' ? W * 0.08 : W * 0.92;
  ball = { x: bx, y: H * 0.10, vx: 0, vy: 0, r: BALL_R };

  const hd = def.hole;
  hole = {
    x: hd.x * W, y: hd.y * H, r: HOLE_R,
    baseX: hd.x * W, baseY: hd.y * H,
    moveAxis: hd.moveAxis || null,
    moveRange: (hd.moveRange || 0) * W,
    moveSpeed: hd.moveSpeed || 0,
    phase: 0
  };

  obstacles = def.platforms.map(p => ({
    x1: p.x1 * W, y1: p.y1 * H,
    x2: p.x2 * W, y2: p.y2 * H,
    baseX1: p.x1 * W, baseY1: p.y1 * H,
    baseX2: p.x2 * W, baseY2: p.y2 * H,
    moveAxis: p.moveAxis || null,
    moveRange: p.moveAxis === 'y' ? (p.moveRange || 0) * H : (p.moveRange || 0) * W,
    moveSpeed: p.moveSpeed || 0,
    phase: Math.random() * Math.PI * 2,
    bouncy: p.bouncy || false,
    required: p.required || false,
    touched: false,
    touchTime: null,
  }));
}

// ──────────────────────────────────────────────────────────────
// INPUT HANDLERS
// ──────────────────────────────────────────────────────────────
function onDown(e) {
  if (launched || gameOver) return;
  const { x, y } = canvasXY(e);
  drawing = true;
  if (mode === 'draw') {
    if (userLines.length >= linesLimit) return;
    currentLine = { x1: x, y1: y, x2: x, y2: y };
  } else {
    eraseAt(x, y);
  }
}

function onMove(e) {
  if (!drawing || launched || gameOver) return;
  const { x, y } = canvasXY(e);
  if (mode === 'draw' && currentLine) {
    currentLine.x2 = x;
    currentLine.y2 = y;
    render();
  } else if (mode === 'erase') {
    eraseAt(x, y);
    render();
  }
}

function onUp() {
  if (!drawing) return;
  drawing = false;
  if (mode === 'draw' && currentLine) {
    const dx = currentLine.x2 - currentLine.x1;
    const dy = currentLine.y2 - currentLine.y1;
    if (Math.hypot(dx, dy) > 5 && userLines.length < linesLimit) {
      userLines.push({ ...currentLine });
    }
    currentLine = null;
    updateHUD();
    render();
  }
}

function eraseAt(x, y) {
  userLines = userLines.filter(l => {
    return distPointSeg(x, y, l.x1, l.y1, l.x2, l.y2) > ERASE_RADIUS;
  });
  updateHUD();
}

// ──────────────────────────────────────────────────────────────
// CONTROLS
// ──────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-draw').classList.toggle('active', m === 'draw');
  document.getElementById('btn-erase').classList.toggle('active', m === 'erase');
}

function clearLines() {
  userLines = [];
  updateHUD();
  if (!launched) render();
}

function undoLine() {
  if (launched || gameOver) return;
  if (userLines.length > 0) {
    userLines.pop();
    updateHUD();
    render();
  }
}

// Resets ball + obstacles/hole to start positions — keeps user-drawn lines
function resetBall() {
  const idx = (level - 1) % LEVELS.length;
  const def = LEVELS[idx];
  launched = false;
  gameOver = false;
  won = false;
  timer = TIME_LIMIT;
  clearInterval(timerInterval);
  if (animId) cancelAnimationFrame(animId);
  setupBallAndObstacles(def);
  hideOverlay();
  updateHUD();
  render();
}

function launch() {
  if (launched || gameOver) return;
  launched = true;
  ball.vx = ball.x < W / 2 ? 1.5 : -1.5;
  ball.vy = 0.5;
  startTimer();
  gameLoop();
}

function skipLevel() {
  level = Math.min(level + 1, LEVELS.length);
  loadLevel(level);
}

function prevLevel() {
  level = Math.max(level - 1, 1);
  loadLevel(level);
}

function nextLevel() {
  level++;
  loadLevel(level);
}

// ──────────────────────────────────────────────────────────────
// TIMER
// ──────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer--;
    document.getElementById('timer-val').textContent = timer;
    document.getElementById('timer-val').classList.toggle('urgent', timer <= 8);
    if (timer <= 0) {
      clearInterval(timerInterval);
      if (!won) endGame(false);
    }
  }, 1000);
}

// ──────────────────────────────────────────────────────────────
// PHYSICS LOOP
// ──────────────────────────────────────────────────────────────
function gameLoop() {
  if (gameOver) return;
  stepPhysics();
  render();
  animId = requestAnimationFrame(gameLoop);
}

function stepPhysics() {
  for (const seg of obstacles) {
    if (seg.moveAxis) {
      seg.phase += seg.moveSpeed;
      const offset = Math.sin(seg.phase) * seg.moveRange;
      if (seg.moveAxis === 'x') {
        seg.x1 = seg.baseX1 + offset;
        seg.x2 = seg.baseX2 + offset;
      } else {
        seg.y1 = seg.baseY1 + offset;
        seg.y2 = seg.baseY2 + offset;
      }
    }
  }

  if (hole.moveAxis) {
    hole.phase += hole.moveSpeed;
    const offset = Math.sin(hole.phase) * hole.moveRange;
    if (hole.moveAxis === 'x') hole.x = hole.baseX + offset;
    else hole.y = hole.baseY + offset;
  }

  ball.vy += GRAVITY;
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;

  let onSurface = false;
  const allLinesCheck = [...obstacles, ...userLines];
  for (const seg of allLinesCheck) {
    if (distPointSeg(ball.x, ball.y + ball.r * 0.3, seg.x1, seg.y1, seg.x2, seg.y2) < ball.r * 1.4) {
      onSurface = true;
      break;
    }
  }

  const minSpeed = 1.2;
  if (!onSurface && Math.abs(ball.vx) < minSpeed) {
    ball.vx += (ball.vx >= 0 ? 1 : -1) * 0.08;
  }

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -0.8; }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx *= -0.8; }

  if (ball.y - ball.r > H + 50) {
    endGame(false);
    return;
  }

  const allLines = [...obstacles, ...userLines];
  for (const seg of allLines) {
    resolveSegCollision(seg);
  }

  // Checkpoint detection — touch must be physically close to the segment
  for (const seg of obstacles) {
    if (seg.required && !seg.touched) {
      if (distPointSeg(ball.x, ball.y, seg.x1, seg.y1, seg.x2, seg.y2) < ball.r + 3) {
        seg.touched = true;
        seg.touchTime = Date.now();
      }
    }
  }

  const dx = ball.x - hole.x;
  const dy = ball.y - hole.y;
  if (Math.hypot(dx, dy) < hole.r * 1.2 && allCheckpointsDone()) {
    endGame(true);
  }
}

function allCheckpointsDone() {
  return obstacles.filter(s => s.required).every(s => s.touched);
}

function resolveSegCollision(seg) {
  const { x1, y1, x2, y2 } = seg;
  const nx = -(y2 - y1);
  const ny = x2 - x1;
  const len = Math.hypot(nx, ny);
  if (len === 0) return;
  const nnx = nx / len;
  const nny = ny / len;

  const upNx = nny < 0 ? nnx : -nnx;
  const upNy = nny < 0 ? nny : -nny;

  const dist = distPointSeg(ball.x, ball.y, x1, y1, x2, y2);
  if (dist < ball.r) {
    ball.x += upNx * (ball.r - dist);
    ball.y += upNy * (ball.r - dist);

    const dot = ball.vx * upNx + ball.vy * upNy;
    if (dot < 0) {
      if (seg.bouncy) {
        ball.vx -= 2.2 * dot * upNx;
        ball.vy -= 2.2 * dot * upNy;
        ball.vx *= 0.98;
        ball.vy *= 0.98;
      } else {
        ball.vx -= 1.5 * dot * upNx;
        ball.vy -= 1.5 * dot * upNy;
        ball.vx *= (Math.abs(upNx) > 0.5) ? 0.92 : 0.98;
        ball.vy *= (Math.abs(upNy) > 0.5) ? 0.92 : 0.98;
      }
    }
  }
}

// ──────────────────────────────────────────────────────────────
// MATH HELPERS
// ──────────────────────────────────────────────────────────────
function distPointSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - x1, py - y1);
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

// ──────────────────────────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = '#ffffff05';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 30) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += 30) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  const holeGrad = ctx.createRadialGradient(hole.x, hole.y, 0, hole.x, hole.y, hole.r * 1.8);
  holeGrad.addColorStop(0, '#000000ff');
  holeGrad.addColorStop(0.5, '#1a0a3a99');
  holeGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(hole.x, hole.y, hole.r * 1.8, 0, Math.PI * 2);
  ctx.fillStyle = holeGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(hole.x, hole.y, hole.r, 0, Math.PI * 2);
  ctx.fillStyle = '#08080f';
  ctx.fill();

  const holeLocked = launched && !allCheckpointsDone();
  if (holeLocked) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.008);
    ctx.strokeStyle = `rgba(255,60,60,${0.5 + pulse * 0.3})`;
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff3c3c';
  } else if (hole.moveAxis) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.006);
    ctx.strokeStyle = `rgba(230,80,220,${pulse})`;
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#e050dc';
  } else {
    ctx.strokeStyle = '#f0c04088';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 0;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.font = `${Math.round(hole.r * 1.1)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (holeLocked) {
    ctx.fillStyle = '#ff3c3c88';
    ctx.fillText('✕', hole.x, hole.y + 1);
  } else {
    ctx.fillStyle = hole.moveAxis ? '#e050dcaa' : '#f0c04066';
    ctx.fillText('★', hole.x, hole.y + 1);
  }

  for (const seg of obstacles) {
    if (seg.required) {
      if (seg.touched) {
        const age = Date.now() - seg.touchTime;
        // White flash fades over 600ms then settles to green
        if (age < 600) {
          const alpha = 1 - age / 600;
          drawSeg(seg, `rgba(255,255,255,${alpha * 0.6})`, 9, false);
        }
        drawSeg(seg, '#50e896', 6, true, '#50e89666');
        drawCheckpointMarker(seg, true);
      } else {
        const pulse = 0.65 + 0.35 * Math.sin(Date.now() * 0.004);
        drawSeg(seg, `rgba(240,192,64,${pulse})`, 6, true, '#f0c04055');
        drawCheckpointMarker(seg, false);
      }
    } else if (seg.bouncy) {
      drawSeg(seg, '#50e896', 5, true, '#50e89644');
    } else if (seg.moveAxis) {
      drawSeg(seg, '#ff9040', 5, true, '#ff904444');
    } else {
      drawSeg(seg, '#a0c8ff', 5, true, '#a0c8ff44');
    }
  }

  for (const seg of userLines) {
    drawSeg(seg, '#60c8f0', 3.5, false);
  }

  if (currentLine) {
    drawSeg(currentLine, '#60c8f088', 3, false);
  }

  if (ball) {
    const bg = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, ball.r);
    bg.addColorStop(0, '#ffffff');
    bg.addColorStop(0.4, '#f0c040');
    bg.addColorStop(1, '#c08000');
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#f0c04099';
    ctx.strokeStyle = '#f0c040';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

function drawCheckpointMarker(seg, done) {
  const mx = (seg.x1 + seg.x2) / 2;
  const my = (seg.y1 + seg.y2) / 2 - 16;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (done) {
    const g = ctx.createRadialGradient(mx, my, 0, mx, my, 14);
    g.addColorStop(0, 'rgba(80,232,150,0.5)');
    g.addColorStop(1, 'rgba(80,232,150,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mx, my, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#50e896';
    ctx.fillText('✓', mx, my);
  } else {
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() * 0.005);
    const g = ctx.createRadialGradient(mx, my, 0, mx, my, 16);
    g.addColorStop(0, `rgba(240,192,64,${pulse * 0.55})`);
    g.addColorStop(1, 'rgba(240,192,64,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(mx, my, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = pulse;
    ctx.font = '13px serif';
    ctx.fillStyle = '#f0c040';
    ctx.fillText('★', mx, my);
  }
  ctx.restore();
}

function drawSeg(seg, color, width, isStatic, glowColor) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  if (isStatic) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = glowColor || '#a0c8ff44';
  }
  ctx.beginPath();
  ctx.moveTo(seg.x1, seg.y1);
  ctx.lineTo(seg.x2, seg.y2);
  ctx.stroke();

  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(seg.x1, seg.y1, width / 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(seg.x2, seg.y2, width / 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// ──────────────────────────────────────────────────────────────
// END GAME
// ──────────────────────────────────────────────────────────────
function computeStars() {
  if (userLines.length === 0) return 3;
  const ratio = userLines.length / linesLimit;
  if (ratio <= 0.34) return 3;
  if (ratio <= 0.67) return 2;
  return 1;
}

function endGame(didWin) {
  if (gameOver) return;
  gameOver = true;
  won = didWin;
  clearInterval(timerInterval);
  if (animId) cancelAnimationFrame(animId);

  const title = document.getElementById('overlay-title');
  const sub = document.getElementById('overlay-sub');
  const starsEl = document.getElementById('overlay-stars');
  const nextBtn = document.querySelector('#overlay button');

  const bonusEl = document.getElementById('overlay-bonus');

  if (didWin) {
    const stars = computeStars();
    const timeBonus = timer * 10;
    title.textContent = '🎉 Rolled In!';
    title.className = 'win';
    sub.textContent = `Level ${level} cleared with ${timer}s to spare.`;
    starsEl.textContent = '★'.repeat(stars) + '☆'.repeat(3 - stars);
    bonusEl.textContent = timeBonus > 0 ? `⏱ Time bonus: +${timeBonus} pts` : '';
    nextBtn.style.display = '';
  } else {
    title.textContent = timer <= 0 ? '⏰ Time\'s Up!' : '💀 Ball Lost!';
    title.className = 'lose';
    sub.textContent = 'Redraw your lines and try again.';
    starsEl.textContent = '';
    bonusEl.textContent = '';
    nextBtn.style.display = 'none';
  }
  showOverlay();

  let retry = document.getElementById('retry-btn');
  if (!didWin) {
    if (!retry) {
      retry = document.createElement('button');
      retry.id = 'retry-btn';
      retry.textContent = '↺ Try Again';
      retry.onclick = () => loadLevel(level);
      document.getElementById('overlay').appendChild(retry);
    }
    retry.style.display = '';
  } else if (retry) {
    retry.style.display = 'none';
  }
}

function showOverlay() { document.getElementById('overlay').classList.add('show'); }
function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

function updateHUD() {
  document.getElementById('lines-val').textContent = userLines.length;
  document.getElementById('lines-limit-sub').textContent = `/ ${linesLimit}`;
  document.getElementById('timer-val').textContent = timer;
  document.getElementById('level-val').textContent = level;

  const atLimit = userLines.length >= linesLimit;
  document.getElementById('btn-draw').classList.toggle('disabled', atLimit);
}
</script>
