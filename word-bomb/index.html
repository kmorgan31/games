<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Bomb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#0f0e0d;
  --surface:#1a1916;
  --surface2:#242220;
  --surface3:#2e2b28;
  --border:#3a3733;
  --border2:#4a4743;
  --text:#f0ede8;
  --text2:#a09d97;
  --text3:#6a6760;
  --accent:#e8d5a3;
  --accent-dim:#8a7d5a;
  --red:#ef4444;
  --red-dim:#7f1d1d;
  --red-bg:#1f0a0a;
  --green:#4ade80;
  --green-dim:#14532d;
  --green-bg:#051a0d;
  --sans:'Syne',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --r:10px;
  --r-lg:14px;
}

body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}

.wrap{max-width:600px;margin:0 auto;padding:28px 16px 80px}

/* ── Typography ── */
h1{font-size:32px;font-weight:800;letter-spacing:-0.04em;line-height:1}
h2{font-size:22px;font-weight:700;letter-spacing:-0.03em}
.label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.1em}

/* ── Surfaces ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:4px 12px;border:1px solid;font-size:12px;font-weight:600}

/* ── Inputs ── */
input[type=text]{
  font-family:var(--mono);font-size:16px;
  padding:11px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r);
  color:var(--text);
  outline:none;
  width:100%;
  transition:border-color .15s;
}
input:focus{border-color:var(--border2)}
input::placeholder{color:var(--text3)}

/* ── Buttons ── */
.btn{
  font-family:var(--sans);font-size:14px;font-weight:700;
  padding:11px 22px;
  border:none;border-radius:var(--r);
  cursor:pointer;
  transition:opacity .15s,transform .1s;
  letter-spacing:.01em;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#0f0e0d}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:var(--red-bg);border:1px solid var(--red-dim);color:var(--red)}

/* ── Progress ── */
.bar-track{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:var(--green);transition:width .45s ease}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}65%{transform:scale(1.18)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
.anim-fadeup{animation:fadeUp .35s ease both}
.anim-shake{animation:shake .45s ease}
.anim-pop{animation:popIn .35s cubic-bezier(.175,.885,.32,1.275)}

/* ── Category grid ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.cat-tile{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:14px 12px;
  cursor:pointer;transition:border-color .15s,background .15s;
  text-align:left;
}
.cat-tile:hover{border-color:var(--border2);background:var(--surface2)}
.cat-tile.active{border-color:var(--accent-dim);background:var(--surface2)}
.cat-emoji{font-size:22px;display:block;margin-bottom:6px}
.cat-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.cat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Miss dots ── */
.dot{width:9px;height:9px;border-radius:50%;transition:background .2s,transform .2s}

/* ── Found chip ── */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  border-radius:var(--r);padding:4px 10px;
  border:1px solid;cursor:default;
}
</style>
</head>

const TIERS = {
  1:{label:"Common",  color:"#4ade80",bg:"#052010",border:"#14532d"},
  2:{label:"Familiar",color:"#60a5fa",bg:"#05101f",border:"#1e3a5f"},
  3:{label:"Tricky",  color:"#fbbf24",bg:"#1a1005",border:"#7c4b00"},
  4:{label:"Obscure", color:"#fb923c",bg:"#1a0e05",border:"#7c2d00"},
  5:{label:"Rare!",   color:"#e879f9",bg:"#16051a",border:"#6b21a8"},
};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let phase = "menu"; // menu | playing | over
let cat = null;
// found entries: {w, pts}  = correct word
//                {w, bomb:true}  = bomb (game-ending)
//                {w, miss:true, pts:0} = wrong guess
let found = [];
let score = 0;
let missStreak = 0;
let overReason = null;
let feedback = null;
let fbTimer = null;
let freshWord = null;

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function startGame(category){
  cat = category;
  found = []; score = 0; missStreak = 0;
  overReason = null; feedback = null; freshWord = null;
  phase = "playing";
  render();
  setTimeout(()=>{
    const inp = document.getElementById("guess-input");
    if(inp) inp.focus();
  },80);
}

// ── Targeted in-game DOM updates ──────────────────────────

function showFeedback(fb){
  clearTimeout(fbTimer);
  feedback = fb;
  updateFeedback();
  if(fb.type !== "miss"){
    fbTimer = setTimeout(()=>{ feedback=null; updateFeedback(); },1900);
  }
}

function updateFeedback(){
  const el = document.getElementById("game-feedback");
  if(!el) return;
  if(!feedback){ el.innerHTML=""; return; }
  const styles = {
    found:{bg:"var(--green-bg)",border:"var(--green-dim)",color:"var(--green)",icon:"✓"},
    bomb: {bg:"var(--red-bg)",  border:"var(--red-dim)",  color:"var(--red)",  icon:"💥"},
    miss: {bg:"var(--surface2)",border:"var(--border)",   color:"var(--text2)",icon:"✗"},
    dupe: {bg:"#1a1505",        border:"#7c4b00",         color:"#fbbf24",     icon:"↩"},
  };
  const s = styles[feedback.type];
  el.innerHTML = `
    <div style="margin-top:9px;padding:8px 12px;background:${s.bg};border:1px solid ${s.border};border-radius:var(--r);font-size:13px;color:${s.color};font-weight:600;display:flex;align-items:center;gap:7px;animation:slideIn .2s ease">
      <span>${s.icon}</span>
      <span>
        ${feedback.type==="found" ? `"${feedback.word}" — +${feedback.pts} pts${feedback.pts===5?" 🔥":feedback.pts===4?" ⭐":""}` : ""}
        ${feedback.type==="bomb"  ? `"${feedback.word}" was a BOMB!` : ""}
        ${feedback.type==="miss"  ? `"${feedback.word}" isn't on the list` : ""}
        ${feedback.type==="dupe"  ? `Already guessed "${feedback.word}"!` : ""}
      </span>
    </div>`;
}

function updateWordsSection(){
  const el = document.getElementById("game-words-section");
  if(!el) return;
  const validFound = found.filter(f=>!f.bomb&&!f.miss);
  const allGuesses  = found.filter(f=>!f.bomb); // found + misses
  if(allGuesses.length === 0){
    el.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Start typing to find words…</div>`;
    return;
  }
  el.innerHTML = `
    <div>
      <div class="label" style="margin-bottom:8px">Found — ${validFound.length} word${validFound.length!==1?"s":""}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${[...allGuesses].reverse().map(f=>{
          if(f.miss){
            return `<div class="chip" style="background:var(--surface2);border-color:var(--border)">
              <span style="font-size:13px;color:var(--text3);font-family:var(--mono);font-weight:500">${f.w}</span>
              <span style="font-size:11px;color:var(--text3);opacity:.5;font-weight:700">+0</span>
            </div>`;
          }
          const t=TIERS[f.pts]||TIERS[1];
          const isFresh = f.w===freshWord;
          return `<div class="chip${isFresh?" anim-pop":""}" style="background:${t.bg};border-color:${t.border}">
            <span style="font-size:13px;color:${t.color};font-family:var(--mono);font-weight:500">${f.w}</span>
            <span style="font-size:11px;color:${t.color};opacity:.7;font-weight:700">+${f.pts}</span>
          </div>`;
        }).join("")}
      </div>
    </div>`;
}

function updateGame(){
  if(phase!=="playing") return;
  const validFound = found.filter(f=>!f.bomb&&!f.miss);
  const pct = Math.round((validFound.length / cat.words.length) * 100);
  const barColor = pct===100?"#4ade80":pct>60?"#86efac":pct>30?"#bef264":"#d9f99d";

  const scoreEl = document.getElementById("game-score");
  if(scoreEl) scoreEl.textContent = score;

  const foundLabel = document.getElementById("game-found-label");
  if(foundLabel) foundLabel.innerHTML = `<strong style="color:var(--text)">${validFound.length}</strong> / ${cat.words.length} found`;

  const remainLabel = document.getElementById("game-remaining-label");
  if(remainLabel) remainLabel.textContent = `${cat.words.length - validFound.length} remaining`;

  const barFill = document.getElementById("game-bar-fill");
  if(barFill){ barFill.style.width = pct+"%"; barFill.style.background = barColor; }

  const missDots = document.getElementById("game-miss-dots");
  if(missDots) missDots.innerHTML = [0,1,2].map(i=>
    `<div class="dot" style="background:${i<missStreak?"var(--red)":"var(--border2)"};transform:${i===missStreak-1&&missStreak>0?"scale(1.5)":"scale(1)"}"></div>`
  ).join("");

  const missText = document.getElementById("game-miss-text");
  if(missText){
    missText.style.color = missStreak===2?"var(--red)":"var(--text3)";
    missText.style.fontWeight = missStreak===2?"700":"400";
    missText.textContent = missStreak===0?"3 misses = game over":missStreak===1?"2 misses left":"⚠ 1 miss left!";
  }

  updateWordsSection();
}

function submitGuess(){
  if(phase!=="playing"||!cat) return;
  const inp = document.getElementById("guess-input");
  if(!inp) return;
  const guess = inp.value.trim().toLowerCase().replace(/[^a-z]/g,"");
  inp.value = "";
  inp.focus();

  if(!guess) return;

  const wordEntry = cat.words.find(w=>w.w===guess);
  const isBomb = cat.bombs.includes(guess);
  const alreadyGuessed = found.some(f=>f.w===guess);

  if(alreadyGuessed){
    showFeedback({type:"dupe",word:guess});
    return;
  }

  if(isBomb){
    found.push({w:guess,bomb:true});
    overReason="bomb";
    showFeedback({type:"bomb",word:guess});
    setTimeout(()=>{phase="over";render();},1300);
    return;
  }

  if(wordEntry){
    found.push({w:guess,pts:wordEntry.p});
    score += wordEntry.p;
    missStreak = 0;
    freshWord = guess;
    showFeedback({type:"found",word:guess,pts:wordEntry.p});
    updateGame();
    setTimeout(()=>{ freshWord=null; updateWordsSection(); },500);
    if(found.filter(f=>!f.bomb&&!f.miss).length === cat.words.length){
      overReason="win";
      setTimeout(()=>{phase="over";render();},900);
    }
  } else {
    found.push({w:guess,miss:true,pts:0});
    missStreak++;
    // Restart shake animation without re-rendering
    inp.classList.remove("anim-shake");
    void inp.offsetWidth; // force reflow to restart animation
    inp.classList.add("anim-shake");
    setTimeout(()=>inp.classList.remove("anim-shake"),500);
    showFeedback({type:"miss",word:guess});
    updateGame();
    if(missStreak>=3){
      overReason="misses";
      setTimeout(()=>{phase="over";render();},1000);
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const app = document.getElementById("app");
  if(phase==="menu") app.innerHTML = renderMenu();
  else if(phase==="playing") app.innerHTML = renderGame();
  else if(phase==="over") app.innerHTML = renderOver();
  attachListeners();
}

function renderMenu(){
  return `
  <div class="anim-fadeup">
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text3);text-decoration:none;margin-bottom:20px">← All games</a>
    <!-- Masthead -->
    <div style="margin-bottom:36px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:42px;height:42px;background:var(--red-bg);border:1px solid var(--red-dim);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px">💣</div>
        <h1 style="color:var(--text)">Word Bomb</h1>
      </div>
      <p style="color:var(--text2);font-size:14px;line-height:1.7;max-width:420px">
        Find all 25 words in the category. Watch out — 10 trap words will end the game instantly. 3 wrong guesses in a row also costs you.
      </p>
    </div>

    <!-- Quick start -->
    <div style="margin-bottom:28px">
      <button class="btn btn-primary" id="btn-random" style="font-size:15px;padding:13px 28px;width:100%;margin-bottom:10px">
        ⚡ Random category
      </button>
    </div>

    <!-- Category picker -->
    <div style="margin-bottom:16px">
      <div class="label" style="margin-bottom:12px">Or pick a category</div>
      <div class="cat-grid">
        ${CATEGORIES.map((c,i)=>`
          <button class="cat-tile" data-cat="${i}">
            <span class="cat-emoji">${c.emoji}</span>
            <div class="cat-name">${c.name}</div>
            <div class="cat-sub">25 words · 10 bombs</div>
          </button>
        `).join("")}
      </div>
    </div>

    <!-- How to play -->
    <div style="margin-top:28px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg)">
      <div class="label" style="margin-bottom:12px">How to play</div>
      <div style="display:flex;flex-direction:column;gap:9px">
        ${[
          ["🎯","Type words that fit the category and press Enter"],
          ["💣","10 words look like they fit but are secret bombs — one hit ends the game"],
          ["❌","3 wrong guesses in a row ends the game (resets when you land a valid word)"],
          ["⭐","Rare or obscure words score up to 5 pts — common ones score 1 pt"],
        ].map(([icon,text])=>`
          <div style="display:flex;gap:10px;font-size:13px;color:var(--text2);align-items:flex-start">
            <span style="flex-shrink:0">${icon}</span><span>${text}</span>
          </div>
        `).join("")}
      </div>
    </div>
  </div>`;
}

function renderGame(){
  const validFound = found.filter(f=>!f.bomb&&!f.miss);
  const allGuesses  = found.filter(f=>!f.bomb);
  const pct = Math.round((validFound.length / cat.words.length) * 100);
  const barColor = pct===100?"#4ade80":pct>60?"#86efac":pct>30?"#bef264":"#d9f99d";

  return `
  <div class="anim-fadeup">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px">
        <a href="../index.html" style="display:inline-flex;align-items:center;font-size:13px;color:var(--text3);text-decoration:none;padding:8px 4px">← Home</a>
        <button class="btn btn-ghost" id="btn-new" style="padding:8px 12px;font-size:13px">↺ New</button>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:22px">${cat.emoji}</span>
          <div>
            <div style="font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--text)">${cat.name}</div>
            <div style="font-size:11px;color:var(--text3)">25 words · 10 bombs</div>
          </div>
        </div>
      </div>
      <div style="text-align:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;min-width:54px">
        <div id="game-score" style="font-size:26px;font-weight:800;line-height:1;color:var(--accent)">${score}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">pts</div>
      </div>
    </div>

    <!-- Progress -->
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span id="game-found-label" style="font-size:12px;color:var(--text2)"><strong style="color:var(--text)">${validFound.length}</strong> / ${cat.words.length} found</span>
        <span id="game-remaining-label" style="font-size:12px;color:var(--text3)">${cat.words.length - validFound.length} remaining</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="game-bar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
    </div>

    <!-- Miss streak -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--text3)">Miss streak</span>
        <div style="display:flex;gap:5px" id="game-miss-dots">
          ${[0,1,2].map(i=>`
            <div class="dot" style="background:${i<missStreak?"var(--red)":"var(--border2)"};transform:${i===missStreak-1&&missStreak>0?"scale(1.5)":"scale(1)"}"></div>
          `).join("")}
        </div>
      </div>
      <span id="game-miss-text" style="font-size:11px;color:${missStreak===2?"var(--red)":"var(--text3)"};font-weight:${missStreak===2?700:400}">
        ${missStreak===0?"3 misses = game over":missStreak===1?"2 misses left":"⚠ 1 miss left!"}
      </span>
    </div>

    <!-- Input -->
    <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:12px;margin-bottom:14px">
      <div style="display:flex;gap:8px">
        <input
          type="text" id="guess-input"
          placeholder="Type a ${cat.name.toLowerCase().replace(/s$/,"")}…"
          autocomplete="off" spellcheck="false"
          style="flex:1"
        />
        <button class="btn btn-primary" id="btn-submit" style="padding:11px 18px;flex-shrink:0">
          Enter ↵
        </button>
      </div>
      <div id="game-feedback"></div>
    </div>

    <!-- Tier legend -->
    <div style="margin-bottom:16px">
      <div class="label" style="margin-bottom:8px">Points</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${[1,2,3,4,5].map(p=>{
          const t=TIERS[p];
          return `<div class="pill" style="background:${t.bg};border-color:${t.border};color:${t.color}">${p}pt <span style="opacity:.7;font-weight:400">${t.label}</span></div>`;
        }).join("")}
      </div>
    </div>

    <!-- Found / missed words -->
    <div id="game-words-section">
      ${allGuesses.length === 0
        ? `<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Start typing to find words…</div>`
        : `<div>
            <div class="label" style="margin-bottom:8px">Found — ${validFound.length} word${validFound.length!==1?"s":""}</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${[...allGuesses].reverse().map(f=>{
                if(f.miss){
                  return `<div class="chip" style="background:var(--surface2);border-color:var(--border)">
                    <span style="font-size:13px;color:var(--text3);font-family:var(--mono);font-weight:500">${f.w}</span>
                    <span style="font-size:11px;color:var(--text3);opacity:.5;font-weight:700">+0</span>
                  </div>`;
                }
                const t=TIERS[f.pts]||TIERS[1];
                const isFresh = f.w===freshWord;
                return `<div class="chip${isFresh?" anim-pop":""}" style="background:${t.bg};border-color:${t.border}">
                  <span style="font-size:13px;color:${t.color};font-family:var(--mono);font-weight:500">${f.w}</span>
                  <span style="font-size:11px;color:${t.color};opacity:.7;font-weight:700">+${f.pts}</span>
                </div>`;
              }).join("")}
            </div>
          </div>`
      }
    </div>
  </div>`;
}

function renderOver(){
  const won = overReason==="win";
  const isBomb = overReason==="bomb";
  const validFound = found.filter(f=>!f.bomb&&!f.miss);
  const maxPossible = cat.words.reduce((s,w)=>s+w.p,0);

  return `
  <div class="anim-fadeup" style="text-align:center;padding:2rem 0">
    <div style="font-size:64px;margin-bottom:10px">${won?"🏆":isBomb?"💥":"😬"}</div>
    <h2 style="margin-bottom:8px">${won?"Board cleared!":isBomb?"Bomb triggered!":"Too many misses"}</h2>
    <p style="color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto">
      ${won?"You found every word without detonating a bomb.":
        isBomb?"You stepped on a trap word and the board exploded.":
        "3 wrong guesses in a row ended your run."}
    </p>

    <!-- Stats -->
    <div style="display:flex;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:28px;gap:1px;background:var(--border)">
      ${[
        [score,"points"],
        [validFound.length,"words found"],
        [cat.words.length,"total words"],
      ].map(([v,l])=>`
        <div style="flex:1;text-align:center;padding:18px 10px;background:var(--surface)">
          <div style="font-size:30px;font-weight:800;line-height:1;color:var(--accent)">${v}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:.06em">${l}</div>
        </div>
      `).join("")}
    </div>

    ${validFound.length > 0 ? `
      <div style="margin-bottom:24px;text-align:left">
        <div class="label" style="margin-bottom:8px;text-align:left">Words you found</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${[...validFound].map(f=>{
            const t=TIERS[f.pts]||TIERS[1];
            return `<div class="chip" style="background:${t.bg};border-color:${t.border}">
              <span style="font-size:12px;color:${t.color};font-family:var(--mono)">${f.w}</span>
              <span style="font-size:10px;color:${t.color};opacity:.6;font-weight:700">+${f.pts}</span>
            </div>`;
          }).join("")}
        </div>
      </div>
    ` : ""}

    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" id="btn-replay" style="font-size:15px;padding:12px 28px">Play again →</button>
      <button class="btn btn-ghost" id="btn-new" style="font-size:14px;padding:12px 20px">New category</button>
    </div>
    <div style="margin-top:16px">
      <a href="../index.html" style="font-size:13px;color:var(--text3);text-decoration:none">← All games</a>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
function attachListeners(){
  // Game
  const btnSubmit = document.getElementById("btn-submit");
  if(btnSubmit) btnSubmit.onclick = submitGuess;

  const inp = document.getElementById("guess-input");
  if(inp){
    inp.onkeydown = e=>{ if(e.key==="Enter"){e.preventDefault();submitGuess();} };
    inp.oninput = ()=>{ if(feedback&&feedback.type==="miss"){ clearTimeout(fbTimer); feedback=null; updateFeedback(); } };
    inp.focus();
  }

  // New random game
  const btnNew = document.getElementById("btn-new");
  if(btnNew) btnNew.onclick = ()=>startGame(CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)]);

  // Replay same category
  const btnReplay = document.getElementById("btn-replay");
  if(btnReplay) btnReplay.onclick = ()=>startGame(cat);
}

// ═══════════════════════════════════════════════════════════
//  BOOT — start immediately with a random category
// ═══════════════════════════════════════════════════════════
startGame(CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)]);
</script>
</body>
</html>
