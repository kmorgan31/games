<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300;1,9..144,700&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap" id="app"></div>

<script src="puzzles.js"></script>
<script>
"use strict";

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let phase = "menu";   // menu | playing | over
let puzzle = null;
let wrongCount = 0;   // 0-3; at 3 → game over
let won = false;
let wrongGuesses = [];
let usedIndices = [];

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function formatDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];
  return `${months[m - 1]} ${d}, ${y}`;
}

function calcAge(born, died = null) {
  const [by, bm, bd] = born.split("-").map(Number);
  let [ry, rm, rd] = died
    ? died.split("-").map(Number)
    : [new Date().getFullYear(), new Date().getMonth() + 1, new Date().getDate()];
  let age = ry - by;
  if (rm < bm || (rm === bm && rd < bd)) age--;
  return age;
}

function nameToBlanks(name) {
  return name
    .split(" ")
    .map(word => word.split("").map(() => "_").join(" "))
    .join("   ");
}

function normalise(str) {
  return str.trim().toLowerCase().replace(/\s+/g, " ");
}

// ═══════════════════════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════════════════════
function goToMenu() {
  phase = "menu";
  render();
}

function startGame() {
  // Cycle through all puzzles before repeating
  const available = PUZZLES.map((_, i) => i).filter(i => !usedIndices.includes(i));
  if (available.length === 0) usedIndices = [];
  const pool = PUZZLES.map((_, i) => i).filter(i => !usedIndices.includes(i));
  const idx = pool[Math.floor(Math.random() * pool.length)];
  usedIndices.push(idx);

  puzzle = PUZZLES[idx];
  wrongCount = 0;
  won = false;
  wrongGuesses = [];
  phase = "playing";
  render();
  focusInput();
}

function focusInput() {
  setTimeout(() => { document.getElementById("guess-input")?.focus(); }, 80);
}

function submitGuess() {
  if (phase !== "playing") return;
  const inp = document.getElementById("guess-input");
  if (!inp) return;
  const raw = inp.value;
  inp.value = "";
  inp.focus();
  if (!raw.trim()) return;

  const guess = normalise(raw);
  const answer = normalise(puzzle.actor.name);
  const lastName = normalise(puzzle.actor.name.split(" ").pop());

  if (guess === answer || guess === lastName) {
    won = true;
    phase = "over";
    render();
    return;
  }

  // Already tried this
  if (wrongGuesses.map(normalise).includes(guess)) {
    shakeInput();
    return;
  }

  wrongGuesses.push(raw.trim());
  wrongCount++;
  shakeInput();

  if (wrongCount >= 3) {
    // Short delay so shake animation plays before transition
    setTimeout(() => { phase = "over"; won = false; render(); }, 600);
    return;
  }

  // Re-render to reveal next hint; years appear via CSS transition
  render();
  focusInput();
}

function shakeInput() {
  const inp = document.getElementById("guess-input");
  if (!inp) return;
  inp.classList.remove("anim-shake");
  void inp.offsetWidth;
  inp.classList.add("anim-shake");
  setTimeout(() => inp.classList.remove("anim-shake"), 500);
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  if (phase === "menu")    app.innerHTML = renderMenu();
  if (phase === "playing") app.innerHTML = renderGame();
  if (phase === "over")    app.innerHTML = renderOver();
  attachListeners();
}

// ── Menu ────────────────────────────────────────────────────
function renderMenu() {
  return `
  <div class="anim-fadeup">
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text3);text-decoration:none;margin-bottom:24px">← All games</a>

    <div style="margin-bottom:32px">
      <div style="margin-bottom:14px">
        <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:600">Film Trivia</div>
        <h1 style="color:var(--text);margin-bottom:10px">Marquee</h1>
        <p style="color:var(--text2);font-size:14px;line-height:1.75;max-width:400px">
          A lineup of films. One actor appeared in all of them — name the star.
        </p>
      </div>
    </div>

    <div style="margin-bottom:28px">
      <button class="btn btn-primary" id="btn-play" style="font-size:16px;padding:14px 28px;width:100%">
        Play →
      </button>
    </div>

    <div style="padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg)">
      <div class="label" style="margin-bottom:12px">How to play</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${[
          ["🎞️", "A set of films is shown with release years — one actor appeared in all of them."],
          ["✏️", "Type the actor's full name and press Enter to guess."],
          ["🟧", "You have 3 lives — each wrong guess costs one."],
          ["💡", "Hints unlock after each miss: actor bio, then name letter count."],
        ].map(([icon, text]) => `
          <div style="display:flex;gap:10px;font-size:13px;color:var(--text2);align-items:flex-start;line-height:1.55">
            <span style="flex-shrink:0;margin-top:1px">${icon}</span><span>${text}</span>
          </div>
        `).join("")}
      </div>
    </div>
  </div>`;
}

// ── Game ────────────────────────────────────────────────────
function renderGame() {
  const showBio    = wrongCount >= 1;
  const showBlanks = wrongCount >= 2;
  const livesLeft  = 3 - wrongCount;

  // Lives dots: filled = alive (accent), lost = red dimmed
  const livesDots = [0, 1, 2].map(i => {
    const lost = i >= livesLeft;
    return `<div class="life-dot${lost ? " lost" : ""}" style="background:${lost ? "var(--red-dim)" : "var(--accent)"}"></div>`;
  }).join("");

  // Hint 1: actor bio (birth/death/age)
  let hint1 = "";
  if (showBio) {
    const a = puzzle.actor;
    const age = calcAge(a.born, a.died);
    hint1 = `
    <div class="hint-card hint-bio">
      <div class="hint-label">Hint 1 — Actor Profile</div>
      <div class="hint-content" style="display:flex;flex-direction:column;gap:5px">
        <div>Born: <strong>${formatDate(a.born)}</strong></div>
        ${a.died
          ? `<div>Died: <strong>${formatDate(a.died)}</strong></div>
             <div>Age at death: <strong>${age}</strong></div>`
          : `<div>Age: <strong>${age}</strong></div>`
        }
      </div>
    </div>`;
  }

  // Hint 2: name blanks — each word rendered as its own flex span so the gap is explicit
  const hint2 = showBlanks ? `
    <div class="hint-card hint-bio">
      <div class="hint-label">Hint 2 — Name</div>
      <div class="hint-content" style="text-align:center;padding:6px 0">
        <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;font-family:var(--mono);font-size:22px;letter-spacing:0.14em;color:var(--text2)">
          ${puzzle.actor.name.split(" ").map(w => `<span>${w.split("").map(() => "_").join(" ")}</span>`).join("")}
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">
          ${puzzle.actor.name.split(" ").map(w => `${w.length} letters`).join(" · ")}
        </div>
      </div>
    </div>` : "";

  // Wrong guesses list
  const wrongList = wrongGuesses.length ? `
    <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px">
      ${wrongGuesses.map(w => `<span class="wrong-chip">✗ ${w}</span>`).join("")}
    </div>` : "";

  return `
  <div class="anim-fadeup">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
      <a href="../index.html" class="btn btn-ghost" style="padding:7px 12px;font-size:13px;text-decoration:none">← All Games</a>
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Lives</span>
        <div style="display:flex;gap:6px">${livesDots}</div>
      </div>
    </div>

    <!-- Prompt -->
    <div style="margin-bottom:16px">
      <div class="label" style="margin-bottom:8px">What actor appeared in all of these films?</div>
      <div class="movie-list">
        ${puzzle.movies.map((m, i) => `
          <div class="movie-row">
            <span class="movie-num">${String(i + 1).padStart(2, "0")}</span>
            <span class="movie-title">${m.title}</span>
            <span class="movie-year visible">${m.year}</span>
          </div>
        `).join("")}
      </div>
    </div>

    <!-- Hints -->
    ${hint1 || hint2 ? `
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      ${hint1}${hint2}
    </div>` : ""}

    <!-- Input -->
    <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);padding:12px;margin-bottom:${wrongGuesses.length ? "10px" : "0"}">
      <div style="display:flex;gap:8px">
        <input
          type="text" id="guess-input"
          placeholder="First and last name…"
          autocomplete="off" spellcheck="false"
          style="flex:1"
        />
        <button class="btn btn-primary" id="btn-submit" style="padding:11px 16px;flex-shrink:0;white-space:nowrap">
          Guess ↵
        </button>
      </div>
    </div>

    ${wrongList}

    <!-- Miss warning -->
    ${livesLeft === 1 ? `
    <div style="margin-top:12px;padding:9px 12px;background:var(--red-bg);border:1px solid var(--red-dim);border-radius:var(--r);font-size:12px;color:var(--red);font-weight:700;text-align:center">
      ⚠ Last life — one more wrong answer and it's over
    </div>` : ""}
  </div>`;
}

// ── Over ────────────────────────────────────────────────────
function renderOver() {
  const a = puzzle.actor;
  const age = calcAge(a.born, a.died);

  if (won) {
    const hintsUsed = wrongCount;
    return `
    <div class="anim-fadeup" style="text-align:center;padding:1.5rem 0">
      <div style="font-size:64px;margin-bottom:12px;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both">🎬</div>
      <h2 style="margin-bottom:8px">Got it!</h2>
      <div style="color:var(--text2);font-size:14px;margin-bottom:24px">
        ${hintsUsed === 0 ? "First guess — incredible!" : `${hintsUsed} hint${hintsUsed !== 1 ? "s" : ""} used`}
      </div>

      <div style="margin-bottom:24px;padding:22px;background:var(--surface);border:1px solid var(--accent-dim);border-left:3px solid var(--accent-dim);border-radius:var(--r-lg)">
        <div class="label" style="margin-bottom:10px;color:var(--accent-dim)">The answer</div>
        <div style="font-family:var(--serif);font-style:italic;font-size:30px;font-weight:700;color:var(--accent);margin-bottom:12px;line-height:1.1">${a.name}</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.75">
          <div>Born: <strong style="color:var(--text)">${formatDate(a.born)}</strong></div>
          ${a.died
            ? `<div>Died: <strong style="color:var(--text)">${formatDate(a.died)}</strong></div>
               <div>Age at death: <strong style="color:var(--text)">${age}</strong></div>`
            : `<div>Age: <strong style="color:var(--text)">${age}</strong></div>`
          }
        </div>
      </div>

      <div style="margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">
        <div style="padding:11px 16px 9px;border-bottom:1px solid var(--border)">
          <div class="label">Films</div>
        </div>
        ${puzzle.movies.map((m, i) => `
          <div class="movie-row">
            <span class="movie-num">${String(i + 1).padStart(2, "0")}</span>
            <span class="movie-title">${m.title}</span>
            <span style="font-family:var(--mono);font-size:13px;color:var(--accent)">${m.year}</span>
          </div>
        `).join("")}
      </div>

      <div style="display:flex;gap:8px;justify-content:center">
        <button class="btn btn-primary" id="btn-replay" style="font-size:15px;padding:12px 26px">Next puzzle →</button>
        <a href="../index.html" class="btn btn-ghost" style="font-size:14px;padding:12px 18px;text-decoration:none">← All Games</a>
      </div>
    </div>`;
  }

  // Lost
  return `
  <div class="anim-fadeup" style="text-align:center;padding:1.5rem 0">
    <div style="font-size:64px;margin-bottom:12px">😔</div>
    <h2 style="margin-bottom:16px">Out of lives</h2>

    <div style="margin-bottom:28px">
      <div style="font-size:13px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em;font-weight:600">The answer</div>
      <div class="name-reveal-answer anim-pop">${a.name}</div>
    </div>

    <div style="margin-bottom:24px;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);text-align:left">
      <div class="label" style="margin-bottom:10px">Actor profile</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.75">
        <div>Born: <strong style="color:var(--text)">${formatDate(a.born)}</strong></div>
        ${a.died
          ? `<div>Died: <strong style="color:var(--text)">${formatDate(a.died)}</strong></div>
             <div>Age at death: <strong style="color:var(--text)">${age}</strong></div>`
          : `<div>Age: <strong style="color:var(--text)">${age}</strong></div>`
        }
      </div>
    </div>

    <div style="margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;text-align:left">
      <div style="padding:11px 16px 9px;border-bottom:1px solid var(--border)">
        <div class="label">Films</div>
      </div>
      ${puzzle.movies.map((m, i) => `
        <div class="movie-row">
          <span class="movie-num">${String(i + 1).padStart(2, "0")}</span>
          <span class="movie-title">${m.title}</span>
          <span style="font-family:var(--mono);font-size:13px;color:var(--text3)">${m.year}</span>
        </div>
      `).join("")}
    </div>

    ${wrongGuesses.length ? `
    <div style="margin-bottom:20px;text-align:left">
      <div class="label" style="margin-bottom:8px">Your guesses</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${wrongGuesses.map(w => `<span class="wrong-chip">✗ ${w}</span>`).join("")}
      </div>
    </div>` : ""}

    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn btn-primary" id="btn-replay" style="font-size:15px;padding:12px 26px">Try another →</button>
      <a href="../index.html" class="btn btn-ghost" style="font-size:14px;padding:12px 18px;text-decoration:none">← All Games</a>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  LISTENERS
// ═══════════════════════════════════════════════════════════
function attachListeners() {
  document.getElementById("btn-play")?.addEventListener("click", startGame);
  document.getElementById("btn-replay")?.addEventListener("click", startGame);

  document.getElementById("btn-submit")?.addEventListener("click", submitGuess);

  const inp = document.getElementById("guess-input");
  if (inp) {
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); submitGuess(); }
    });
    inp.focus();
  }
}

// ═══════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
